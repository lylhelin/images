<svg width="920" height="300" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow-verify" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>    </marker>  </defs>  <style>    .svg-title {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 22px;      font-weight: 700;      fill: #111827;    }    .svg-text {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 15px;      font-weight: 600;      fill: #111827;    }    .svg-small {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 13px;      fill: #6b7280;    }    .node-blue {      fill: #eff6ff;      stroke: #2563eb;      stroke-width: 2;    }    .node-green {      fill: #f0fdf4;      stroke: #16a34a;      stroke-width: 2;    }    .node-orange {      fill: #fff7ed;      stroke: #d97706;      stroke-width: 2;    }    .node-purple {      fill: #f5f3ff;      stroke: #7c3aed;      stroke-width: 2;    }    .node-white {      fill: #ffffff;      stroke: #2563eb;      stroke-width: 2;    }    .v-line {      stroke: #2563eb;      stroke-width: 2.4;      fill: none;      marker-end: url(#arrow-verify);    }  </style>  <rect x="0" y="0" width="920" height="300" rx="16" fill="#f8fafc"/>  <text x="460" y="40" text-anchor="middle" class="svg-title">AI 生成 - 验证 - 修复闭环</text>  <rect x="40" y="95" width="120" height="56" rx="10" class="node-white"/>  <text x="100" y="128" text-anchor="middle" class="svg-text">需求输入</text>  <line x1="160" y1="123" x2="210" y2="123" class="v-line"/>  <rect x="210" y="95" width="120" height="56" rx="10" class="node-blue"/>  <text x="270" y="128" text-anchor="middle" class="svg-text">任务拆解</text>  <line x1="330" y1="123" x2="380" y2="123" class="v-line"/>  <rect x="380" y="95" width="120" height="56" rx="10" class="node-blue"/>  <text x="440" y="128" text-anchor="middle" class="svg-text">上下文检索</text>  <line x1="500" y1="123" x2="550" y2="123" class="v-line"/>  <rect x="550" y="95" width="120" height="56" rx="10" class="node-purple"/>  <text x="610" y="128" text-anchor="middle" class="svg-text">模型生成</text>  <line x1="670" y1="123" x2="720" y2="123" class="v-line"/>  <rect x="720" y="95" width="120" height="56" rx="10" class="node-orange"/>  <text x="780" y="128" text-anchor="middle" class="svg-text">自动测试</text>  <path d="M780 151 C780 205 610 215 610 151" class="v-line"/>  <text x="695" y="230" text-anchor="middle" class="svg-small">失败日志反馈给模型修复</text>  <line x1="780" y1="151" x2="780" y2="195" class="v-line"/>  <rect x="720" y="195" width="120" height="56" rx="10" class="node-green"/>  <text x="780" y="228" text-anchor="middle" class="svg-text">通过合并</text></svg>