<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="760" fill="#ffffff"/>

  <!-- ============== 节点 01: Agent 尝试修改文件 ============== -->
  <g>
    <rect x="80" y="50" width="460" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="75" r="12" fill="#1f2937"/>
    <text x="107" y="79" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">01</text>
    <text x="133" y="81" font-size="14" font-weight="500" fill="#111827">Agent 尝试修改文件</text>
  </g>
  <line x1="310" y1="100" x2="310" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 02: Harness 检查文件路径 [重点 · 加粗边框] ============== -->
  <g>
    <rect x="80" y="130" width="460" height="60" rx="10" fill="#f3f4f6" stroke="#1f2937" stroke-width="2.5"/>
    <circle cx="110" cy="160" r="13" fill="#1f2937"/>
    <text x="110" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">02</text>
    <text x="138" y="156" font-size="11" font-weight="700" fill="#1f2937" letter-spacing="0.5">Harness</text>
    <text x="138" y="178" font-size="14" font-weight="600" fill="#111827">检查文件路径</text>
  </g>
  <line x1="310" y1="190" x2="310" y2="220" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 03: 命中高风险规则 ============== -->
  <g>
    <rect x="80" y="220" width="460" height="55" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="247" r="12" fill="#1f2937"/>
    <text x="107" y="251" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">03</text>
    <text x="133" y="253" font-size="14" font-weight="500" fill="#111827">命中高风险规则</text>
  </g>

  <!-- 高风险规则列表 (节点 3 右侧 · 虚线浅灰底) -->
  <g>
    <rect x="580" y="210" width="280" height="200" rx="10" fill="#fafafa" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="600" y="234" font-size="12" font-weight="600" fill="#1f2937">高风险路径示例</text>
    <text x="600" y="249" font-size="10" fill="#6b7280" font-style="italic">命中即触发熔断</text>
    <line x1="600" y1="257" x2="842" y2="257" stroke="#d1d5db" stroke-width="1"/>

    <!-- 6 项规则 -->
    <g>
      <text x="608" y="278" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="281" font-size="12" fill="#374151">生产配置 prod.yaml</text>
    </g>
    <g>
      <text x="608" y="298" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="301" font-size="12" fill="#374151">数据库迁移脚本 migrations/</text>
    </g>
    <g>
      <text x="608" y="318" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="321" font-size="12" fill="#374151">CI/CD 脚本 .github/workflows/</text>
    </g>
    <g>
      <text x="608" y="338" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="341" font-size="12" fill="#374151">金额核心逻辑 PricingCore.*</text>
    </g>
    <g>
      <text x="608" y="358" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="361" font-size="12" fill="#374151">Secret 文件 *.env, *.pem</text>
    </g>
    <g>
      <text x="608" y="378" font-size="12" font-weight="700" fill="#1f2937" font-family="monospace">/</text>
      <text x="620" y="381" font-size="12" fill="#374151">历史兼容配置 legacy/</text>
    </g>
  </g>

  <line x1="310" y1="275" x2="310" y2="310" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 04: 自动停止 · 安全熔断 [重点 · 加粗 + 停止符号] ============== -->
  <g>
    <rect x="80" y="310" width="460" height="80" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
    <!-- 停止符号: 方框 + 斜线 -->
    <g transform="translate(112, 350)">
      <rect x="-14" y="-14" width="28" height="28" rx="3" fill="none" stroke="#1f2937" stroke-width="2.5"/>
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="142" y="338" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.5">04 · CIRCUIT BREAKER</text>
    <text x="142" y="362" font-size="16" font-weight="700" fill="#111827">自动停止</text>
    <text x="142" y="382" font-size="13" fill="#4b5563">安全熔断 · 不进入修改阶段</text>
  </g>
  <line x1="310" y1="390" x2="310" y2="420" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 05: 生成风险报告 ============== -->
  <g>
    <rect x="80" y="420" width="460" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="445" r="12" fill="#1f2937"/>
    <text x="107" y="449" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">05</text>
    <text x="133" y="451" font-size="14" font-weight="500" fill="#111827">生成风险报告</text>
  </g>
  <line x1="310" y1="470" x2="310" y2="500" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 06: 转人工确认 ============== -->
  <g>
    <rect x="80" y="500" width="460" height="55" rx="8" fill="#e5e7eb" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="527" r="12" fill="#1f2937"/>
    <text x="107" y="531" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">06</text>
    <text x="133" y="533" font-size="14" font-weight="600" fill="#111827">转人工确认</text>
  </g>

  <!-- ============== 底部强调 ============== -->
  <line x1="120" y1="615" x2="780" y2="615" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="660" text-anchor="middle" font-size="17" fill="#1f2937">
    <tspan>Prompt 是软约束，</tspan>
    <tspan font-weight="700">门禁和熔断才是硬约束。</tspan>
  </text>
</svg>
