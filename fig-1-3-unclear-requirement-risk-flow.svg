<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 画布 -->
  <rect width="1000" height="360" fill="#ffffff"/>

  <!-- ============== 小标签 ============== -->
  <!-- 节点 2 上方: 未确认假设 -->
  <g>
    <rect x="222" y="22" width="82" height="24" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="236" cy="34" r="2.5" fill="#4b5563"/>
    <text x="246" y="38" font-size="11" fill="#374151">未确认假设</text>
  </g>

  <!-- 节点 4 上方: 测试验证了错误前提 -->
  <g>
    <rect x="510" y="22" width="138" height="24" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="526" cy="34" r="2.5" fill="#4b5563"/>
    <text x="536" y="38" font-size="11" fill="#374151">测试验证了错误前提</text>
  </g>

  <!-- ============== 6 个主流程节点 ============== -->

  <!-- 节点 01: 模糊需求 -->
  <g>
    <rect x="40" y="75" width="130" height="115" rx="8" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <text x="105" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">01</text>
    <text x="105" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">模糊需求</text>
    <text x="105" y="155" text-anchor="middle" font-size="11" fill="#6b7280">关键约束</text>
    <text x="105" y="172" text-anchor="middle" font-size="11" fill="#6b7280">未写明</text>
  </g>
  <line x1="170" y1="132" x2="194" y2="132" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 节点 02: AI 自动推断业务规则 -->
  <g>
    <rect x="198" y="75" width="130" height="115" rx="8" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <text x="263" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">02</text>
    <text x="263" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">AI 自动推断</text>
    <text x="263" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">业务规则</text>
  </g>
  <line x1="328" y1="132" x2="352" y2="132" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 节点 03: 生成看似合理的实现 -->
  <g>
    <rect x="356" y="75" width="130" height="115" rx="8" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <text x="421" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">03</text>
    <text x="421" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">生成看似</text>
    <text x="421" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">合理的实现</text>
  </g>
  <line x1="486" y1="132" x2="510" y2="132" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 节点 04: 测试只验证 AI 假设 -->
  <g>
    <rect x="514" y="75" width="130" height="115" rx="8" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <text x="579" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">04</text>
    <text x="579" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">测试只验证</text>
    <text x="579" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">AI 自己假设的</text>
  </g>
  <line x1="644" y1="132" x2="668" y2="132" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 节点 05: PR 看起来通过 -->
  <g>
    <rect x="672" y="75" width="130" height="115" rx="8" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <text x="737" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">05</text>
    <text x="737" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">PR 看起来</text>
    <text x="737" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">通过</text>
  </g>
  <line x1="802" y1="132" x2="826" y2="132" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 节点 06: 真实业务场景出错（深色反白突出） -->
  <g>
    <rect x="830" y="75" width="130" height="115" rx="8" fill="#1f2937" stroke="#1f2937" stroke-width="2.5"/>
    <text x="895" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="1">06</text>
    <!-- 警示三角图标 -->
    <g transform="translate(895, 118)">
      <polygon points="0,-7 8,7 -8,7" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="0" y1="-1" x2="0" y2="3" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="5.5" r="1" fill="#ffffff"/>
    </g>
    <text x="895" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">真实业务</text>
    <text x="895" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">场景出错</text>
  </g>

  <!-- ============== 底部总结 ============== -->
  <line x1="120" y1="230" x2="880" y2="230" stroke="#d1d5db" stroke-width="1"/>

  <text x="500" y="278" text-anchor="middle" font-size="17" fill="#1f2937">
    <tspan>代码可能是干净的，测试可能是通过的，</tspan>
    <tspan font-weight="700">但业务逻辑可能是错的。</tspan>
  </text>
</svg>
