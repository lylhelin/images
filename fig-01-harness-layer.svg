<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow-harness" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>    </marker>  </defs>  <style>    .svg-title {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 22px;      font-weight: 700;      fill: #111827;    }    .svg-text {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 15px;      font-weight: 600;      fill: #111827;    }    .svg-small {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 13px;      fill: #6b7280;    }    .node-blue {      fill: #eff6ff;      stroke: #2563eb;      stroke-width: 2;    }    .node-green {      fill: #f0fdf4;      stroke: #16a34a;      stroke-width: 2;    }    .node-orange {      fill: #fff7ed;      stroke: #d97706;      stroke-width: 2;    }    .node-purple {      fill: #f5f3ff;      stroke: #7c3aed;      stroke-width: 2;    }    .node-white {      fill: #ffffff;      stroke: #2563eb;      stroke-width: 2;    }    .layer {      fill: #ffffff;      stroke: #e5e7eb;      stroke-width: 2;    }    .h-line {      stroke: #2563eb;      stroke-width: 2.4;      fill: none;      marker-end: url(#arrow-harness);    }  </style>  <rect width="920" height="360" rx="16" fill="#f8fafc"/>  <text x="460" y="38" text-anchor="middle" class="svg-title">Harness 工程：大模型能力的工程承载层</text>  <rect x="60" y="80" width="170" height="58" rx="12" class="node-white"/>  <text x="145" y="114" text-anchor="middle" class="svg-text">用户任务</text>  <line x1="230" y1="109" x2="285" y2="109" class="h-line"/>  <rect x="285" y="68" width="350" height="190" rx="14" class="layer"/>  <text x="460" y="98" text-anchor="middle" class="svg-text">Harness 工程层</text>  <rect x="315" y="120" width="130" height="36" rx="8" class="node-blue"/>  <text x="380" y="143" text-anchor="middle" class="svg-small">任务拆解</text>  <rect x="475" y="120" width="130" height="36" rx="8" class="node-blue"/>  <text x="540" y="143" text-anchor="middle" class="svg-small">上下文构建</text>  <rect x="315" y="170" width="130" height="36" rx="8" class="node-green"/>  <text x="380" y="193" text-anchor="middle" class="svg-small">模型路由</text>  <rect x="475" y="170" width="130" height="36" rx="8" class="node-green"/>  <text x="540" y="193" text-anchor="middle" class="svg-small">工具调用</text>  <rect x="395" y="218" width="130" height="36" rx="8" class="node-orange"/>  <text x="460" y="241" text-anchor="middle" class="svg-small">验证反馈</text>  <line x1="635" y1="109" x2="690" y2="109" class="h-line"/>  <rect x="690" y="80" width="170" height="58" rx="12" class="node-purple"/>  <text x="775" y="114" text-anchor="middle" class="svg-text">大模型能力</text>  <path d="M775 138 C775 305 145 305 145 138" class="h-line"/>  <text x="460" y="323" text-anchor="middle" class="svg-small">通过成本、质量、反馈和验证数据持续优化 Token ROI</text></svg>