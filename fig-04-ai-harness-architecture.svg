<svg width="960" height="560" viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow-arch" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>    </marker>  </defs>  <style>    .svg-title {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 22px;      font-weight: 700;      fill: #111827;    }    .svg-text {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 15px;      font-weight: 600;      fill: #111827;    }    .svg-small {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 13px;      fill: #6b7280;    }    .node-blue {      fill: #eff6ff;      stroke: #2563eb;      stroke-width: 2;    }    .node-green {      fill: #f0fdf4;      stroke: #16a34a;      stroke-width: 2;    }    .node-orange {      fill: #fff7ed;      stroke: #d97706;      stroke-width: 2;    }    .node-purple {      fill: #f5f3ff;      stroke: #7c3aed;      stroke-width: 2;    }    .layer {      fill: #ffffff;      stroke: #e5e7eb;      stroke-width: 2;    }    .a-line {      stroke: #2563eb;      stroke-width: 2.2;      fill: none;      marker-end: url(#arrow-arch);    }  </style>  <rect width="960" height="560" rx="16" fill="#f8fafc"/>  <text x="480" y="40" text-anchor="middle" class="svg-title">AI Harness 工程架构</text>  <rect x="60" y="70" width="840" height="60" rx="12" class="layer"/>  <text x="480" y="106" text-anchor="middle" class="svg-text">用户入口：IDE / Chat / 工单 / CLI / 研发平台</text>  <line x1="480" y1="130" x2="480" y2="160" class="a-line"/>  <rect x="320" y="160" width="320" height="56" rx="12" class="node-blue"/>  <text x="480" y="194" text-anchor="middle" class="svg-text">任务识别、分类与 Token 预算</text>  <line x1="480" y1="216" x2="250" y2="260" class="a-line"/>  <line x1="480" y1="216" x2="480" y2="260" class="a-line"/>  <line x1="480" y1="216" x2="710" y2="260" class="a-line"/>  <rect x="70" y="260" width="350" height="150" rx="12" class="layer"/>  <text x="245" y="288" text-anchor="middle" class="svg-text">上下文构建层</text>  <rect x="105" y="310" width="130" height="36" rx="8" class="node-blue"/>  <text x="170" y="333" text-anchor="middle" class="svg-small">代码检索</text>  <rect x="255" y="310" width="130" height="36" rx="8" class="node-blue"/>  <text x="320" y="333" text-anchor="middle" class="svg-small">文档检索</text>  <rect x="105" y="360" width="130" height="36" rx="8" class="node-blue"/>  <text x="170" y="383" text-anchor="middle" class="svg-small">日志检索</text>  <rect x="255" y="360" width="130" height="36" rx="8" class="node-blue"/>  <text x="320" y="383" text-anchor="middle" class="svg-small">历史 PR</text>  <rect x="440" y="260" width="220" height="150" rx="12" class="layer"/>  <text x="550" y="288" text-anchor="middle" class="svg-text">Agent 编排层</text>  <rect x="470" y="310" width="160" height="36" rx="8" class="node-purple"/>  <text x="550" y="333" text-anchor="middle" class="svg-small">Planner / Coder</text>  <rect x="470" y="360" width="160" height="36" rx="8" class="node-purple"/>  <text x="550" y="383" text-anchor="middle" class="svg-small">Tester / Reviewer</text>  <rect x="680" y="260" width="220" height="150" rx="12" class="layer"/>  <text x="790" y="288" text-anchor="middle" class="svg-text">工具执行层</text>  <rect x="710" y="310" width="160" height="36" rx="8" class="node-orange"/>  <text x="790" y="333" text-anchor="middle" class="svg-small">Build / Test</text>  <rect x="710" y="360" width="160" height="36" rx="8" class="node-orange"/>  <text x="790" y="383" text-anchor="middle" class="svg-small">Lint / Scan</text>  <line x1="550" y1="410" x2="550" y2="440" class="a-line"/>  <rect x="320" y="440" width="460" height="54" rx="12" class="node-green"/>  <text x="550" y="474" text-anchor="middle" class="svg-text">结果验证、人工 Review、合并发布</text>  <line x1="780" y1="467" x2="845" y2="505" class="a-line"/>  <rect x="770" y="505" width="150" height="36" rx="8" class="node-blue"/>  <text x="845" y="528" text-anchor="middle" class="svg-small">指标评估系统</text>  <path d="M845 505 C900 420 850 220 640 188" class="a-line"/></svg>