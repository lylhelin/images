<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1150" viewBox="0 0 1400 1150">
  <defs>
    <style>
      .title{font:700 28px 'Arial','Microsoft YaHei',sans-serif;fill:#111827}.sub{font:600 18px 'Arial','Microsoft YaHei',sans-serif;fill:#111827}.txt{font:14px 'Arial','Microsoft YaHei',sans-serif;fill:#1f2937}.small{font:12px 'Arial','Microsoft YaHei',sans-serif;fill:#374151}.box{rx:14;ry:14;stroke:#334155;stroke-width:1.5}.layer{rx:18;ry:18;stroke-width:2}.arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow2)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect width="1400" height="1150" fill="#f8fafc"/>
  <text x="700" y="44" text-anchor="middle" class="title">本体分层驱动的知识消费链路架构图</text>

  <!-- Top consumer -->
  <rect x="430" y="75" width="540" height="72" class="box" fill="#dbeafe"/>
  <text x="700" y="105" text-anchor="middle" class="sub">上层消费方</text>
  <text x="700" y="130" text-anchor="middle" class="txt">Agent / Skill / IDE / CI流水线 / 研发工具</text>

  <!-- Service layer -->
  <rect x="290" y="195" width="820" height="210" class="layer" fill="#ecfdf5" stroke="#059669"/>
  <text x="700" y="225" text-anchor="middle" class="sub">统一知识消费服务层</text>
  <g>
    <rect x="320" y="250" width="150" height="58" class="box" fill="#ffffff"/><text x="395" y="274" text-anchor="middle" class="txt">意图识别</text><text x="395" y="295" text-anchor="middle" class="small">任务/领域/目标</text>
    <rect x="495" y="250" width="150" height="58" class="box" fill="#ffffff"/><text x="570" y="274" text-anchor="middle" class="txt">语义路由</text><text x="570" y="295" text-anchor="middle" class="small">选择知识源</text>
    <rect x="670" y="250" width="150" height="58" class="box" fill="#ffffff"/><text x="745" y="274" text-anchor="middle" class="txt">语义对齐</text><text x="745" y="295" text-anchor="middle" class="small">同义词/术语归一</text>
    <rect x="845" y="250" width="150" height="58" class="box" fill="#ffffff"/><text x="920" y="274" text-anchor="middle" class="txt">多源检索</text><text x="920" y="295" text-anchor="middle" class="small">四库/图谱/代码</text>
    <rect x="405" y="325" width="160" height="58" class="box" fill="#ffffff"/><text x="485" y="349" text-anchor="middle" class="txt">融合排序</text><text x="485" y="370" text-anchor="middle" class="small">置信度/权威性</text>
    <rect x="620" y="325" width="160" height="58" class="box" fill="#ffffff"/><text x="700" y="349" text-anchor="middle" class="txt">解释溯源</text><text x="700" y="370" text-anchor="middle" class="small">证据/版本/Owner</text>
    <rect x="835" y="325" width="160" height="58" class="box" fill="#ffffff"/><text x="915" y="349" text-anchor="middle" class="txt">反馈入口</text><text x="915" y="370" text-anchor="middle" class="small">采纳/拒绝/纠错</text>
  </g>

  <!-- Ontology -->
  <rect x="55" y="465" width="360" height="300" class="layer" fill="#fef3c7" stroke="#d97706"/>
  <text x="235" y="495" text-anchor="middle" class="sub">本体与语义治理层</text>
  <rect x="85" y="525" width="300" height="45" class="box" fill="#fff7ed"/><text x="235" y="552" text-anchor="middle" class="txt">L0 元本体：建模规则、元数据、关系类型</text>
  <rect x="85" y="585" width="300" height="45" class="box" fill="#fff7ed"/><text x="235" y="612" text-anchor="middle" class="txt">L1 通用核心本体：需求、接口、组件、用例</text>
  <rect x="85" y="645" width="300" height="45" class="box" fill="#fff7ed"/><text x="235" y="672" text-anchor="middle" class="txt">L2 领域本体：需求/设计/编码/测试域</text>
  <rect x="85" y="705" width="300" height="45" class="box" fill="#fff7ed"/><text x="235" y="732" text-anchor="middle" class="txt">L3 项目扩展：5GNR / UME / xGW / iTCF</text>

  <!-- Core semantic -->
  <rect x="470" y="465" width="380" height="300" class="layer" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="660" y="495" text-anchor="middle" class="sub">核心语义区：高可信、结构化</text>
  <rect x="500" y="525" width="140" height="70" class="box" fill="#fff"/><text x="570" y="555" text-anchor="middle" class="txt">对象库</text><text x="570" y="577" text-anchor="middle" class="small">实体/对象/属性</text>
  <rect x="680" y="525" width="140" height="70" class="box" fill="#fff"/><text x="750" y="555" text-anchor="middle" class="txt">系统库</text><text x="750" y="577" text-anchor="middle" class="small">关系/依赖/影响</text>
  <rect x="500" y="635" width="140" height="70" class="box" fill="#fff"/><text x="570" y="665" text-anchor="middle" class="txt">过程库</text><text x="570" y="687" text-anchor="middle" class="small">流程/步骤/轨迹</text>
  <rect x="680" y="635" width="140" height="70" class="box" fill="#fff"/><text x="750" y="665" text-anchor="middle" class="txt">方法库</text><text x="750" y="687" text-anchor="middle" class="small">方法/规则/Skill</text>

  <!-- General semantic -->
  <rect x="910" y="465" width="430" height="300" class="layer" fill="#fce7f3" stroke="#db2777"/>
  <text x="1125" y="495" text-anchor="middle" class="sub">泛化语义区：宽覆盖、辅助召回</text>
  <rect x="940" y="525" width="170" height="70" class="box" fill="#fff"/><text x="1025" y="552" text-anchor="middle" class="txt">GraphRAG / Graphify</text><text x="1025" y="575" text-anchor="middle" class="small">自动图谱/宽域关联</text>
  <rect x="1140" y="525" width="170" height="70" class="box" fill="#fff"/><text x="1225" y="552" text-anchor="middle" class="txt">向量索引</text><text x="1225" y="575" text-anchor="middle" class="small">语义相似检索</text>
  <rect x="940" y="635" width="170" height="70" class="box" fill="#fff"/><text x="1025" y="662" text-anchor="middle" class="txt">代码语义索引</text><text x="1025" y="685" text-anchor="middle" class="small">Codebase/调用链</text>
  <rect x="1140" y="635" width="170" height="70" class="box" fill="#fff"/><text x="1225" y="662" text-anchor="middle" class="txt">历史方案索引</text><text x="1225" y="685" text-anchor="middle" class="small">相似需求/历史设计</text>

  <!-- Sources -->
  <rect x="160" y="830" width="500" height="180" class="layer" fill="#f1f5f9" stroke="#475569"/>
  <text x="410" y="860" text-anchor="middle" class="sub">原始知识源</text>
  <text x="200" y="895" class="txt">• 需求文档 / 设计文档 / 代码仓</text>
  <text x="200" y="925" class="txt">• 测试用例与测试结果 / 缺陷单</text>
  <text x="200" y="955" class="txt">• 评审记录 / 会议纪要 / 空间页面</text>
  <text x="200" y="985" class="txt">• iCenter / Git 文档 / 历史方案</text>

  <!-- Regen -->
  <rect x="740" y="830" width="500" height="180" class="layer" fill="#fee2e2" stroke="#dc2626"/>
  <text x="990" y="860" text-anchor="middle" class="sub">知识再生与治理闭环</text>
  <text x="780" y="895" class="txt">• 消费反馈沉淀：采纳/拒绝/用户反馈</text>
  <text x="780" y="925" class="txt">• 低置信知识治理：确认/纠错/废弃</text>
  <text x="780" y="955" class="txt">• 新增知识回流：对象/关系/流程/方法</text>
  <text x="780" y="985" class="txt">• 本体变更提案与元数据更新</text>

  <!-- arrows -->
  <path d="M700 147 L700 195" class="arrow"/>
  <path d="M700 405 L660 465" class="arrow"/>
  <path d="M600 405 L235 465" class="arrow"/>
  <path d="M800 405 L1125 465" class="arrow"/>
  <path d="M920 405 C980 790 1000 790 990 830" class="arrow"/>
  <path d="M410 830 L600 765" class="arrow"/>
  <path d="M410 830 C500 780 930 780 1125 765" class="arrow"/>
  <path d="M990 830 L760 765" class="arrow"/>
  <path d="M990 830 C820 790 360 790 235 765" class="arrow"/>
  <path d="M415 615 L470 615" class="dash"/>
  <path d="M850 615 L910 615" class="dash"/>
  <path d="M660 465 C690 435 690 435 700 405" class="dash"/>

  <text x="438" y="603" class="small">约束结构</text>
  <text x="860" y="603" class="small">辅助召回</text>
  <text x="700" y="438" class="small">指导检索与解释</text>
</svg>
