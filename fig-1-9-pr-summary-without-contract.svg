<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="780" fill="#ffffff"/>

  <!-- ============== 节点 01: AI 生成代码 ============== -->
  <g>
    <rect x="80" y="50" width="460" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="75" r="12" fill="#1f2937"/>
    <text x="107" y="79" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">01</text>
    <text x="133" y="81" font-size="14" font-weight="500" fill="#111827">AI 生成代码</text>
  </g>
  <line x1="310" y1="100" x2="310" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 02: AI 生成漂亮总结 ============== -->
  <g>
    <rect x="80" y="130" width="460" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="155" r="12" fill="#1f2937"/>
    <text x="107" y="159" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">02</text>
    <text x="133" y="161" font-size="14" font-weight="500" fill="#111827">AI 生成漂亮总结</text>
  </g>

  <!-- 文档小框 (节点 2 右侧) -->
  <g>
    <rect x="570" y="115" width="290" height="85" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <!-- 文档图标 -->
    <g transform="translate(585, 135)">
      <path d="M0,0 L0,38 L22,38 L22,8 L14,0 z" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
      <path d="M14,0 L14,8 L22,8" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
      <line x1="3" y1="18" x2="19" y2="18" stroke="#6b7280" stroke-width="1"/>
      <line x1="3" y1="24" x2="19" y2="24" stroke="#6b7280" stroke-width="1"/>
      <line x1="3" y1="30" x2="14" y2="30" stroke="#6b7280" stroke-width="1"/>
    </g>
    <text x="618" y="142" font-size="11" font-weight="600" fill="#1f2937">PR 摘要 · AI 生成</text>
    <text x="618" y="161" font-size="11" fill="#374151" font-style="italic">"优化计价逻辑，补充测试，</text>
    <text x="618" y="177" font-size="11" fill="#374151" font-style="italic">提高可维护性……"</text>
    <text x="618" y="193" font-size="10" fill="#6b7280">格式完整 · 语义模糊</text>
  </g>
  <!-- 标签: 漂亮但不充分 -->
  <g>
    <rect x="570" y="210" width="120" height="24" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="584" cy="222" r="2.5" fill="#4b5563"/>
    <text x="594" y="226" font-size="11" fill="#4b5563">漂亮但不充分</text>
  </g>

  <line x1="310" y1="180" x2="310" y2="210" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 03: 评审人无法判断影响范围 ============== -->
  <g>
    <rect x="80" y="210" width="460" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="235" r="12" fill="#1f2937"/>
    <text x="107" y="239" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">03</text>
    <text x="133" y="241" font-size="14" font-weight="500" fill="#111827">评审人无法判断影响范围</text>
  </g>

  <!-- 缺失字段列表 (节点 3 右侧 · 虚线框) -->
  <g>
    <rect x="570" y="245" width="290" height="215" rx="8" fill="#fafafa" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="588" y="268" font-size="12" font-weight="600" fill="#1f2937">应输出但缺失</text>
    <text x="588" y="283" font-size="10" fill="#6b7280" font-style="italic">结构化字段 · 工程接口</text>
    <line x1="588" y1="291" x2="842" y2="291" stroke="#d1d5db" stroke-width="1"/>

    <!-- 6 个缺失字段（用灰色 ✗） -->
    <g>
      <text x="595" y="313" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="316" font-size="12" fill="#374151">修改文件清单</text>
    </g>
    <g>
      <text x="595" y="335" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="338" font-size="12" fill="#374151">影响范围（依赖 / 接口）</text>
    </g>
    <g>
      <text x="595" y="357" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="360" font-size="12" fill="#374151">测试证据（新增 / 回归）</text>
    </g>
    <g>
      <text x="595" y="379" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="382" font-size="12" fill="#374151">风险等级</text>
    </g>
    <g>
      <text x="595" y="401" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="404" font-size="12" fill="#374151">回滚方案</text>
    </g>
    <g>
      <text x="595" y="423" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle">✗</text>
      <text x="610" y="426" font-size="12" fill="#374151">Loop Summary</text>
    </g>
  </g>

  <line x1="310" y1="260" x2="310" y2="395" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 04: 评审人重新阅读所有 diff ============== -->
  <g>
    <rect x="80" y="395" width="460" height="50" rx="8" fill="#f3f4f6" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="420" r="12" fill="#1f2937"/>
    <text x="107" y="424" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">04</text>
    <text x="133" y="426" font-size="14" font-weight="500" fill="#111827">评审人重新阅读所有 diff</text>
  </g>
  <line x1="310" y1="445" x2="310" y2="475" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 05: 评审成本上升 (浅灰底加重) ============== -->
  <g>
    <rect x="80" y="475" width="460" height="50" rx="8" fill="#e5e7eb" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="107" cy="500" r="12" fill="#1f2937"/>
    <text x="107" y="504" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">05</text>
    <text x="133" y="506" font-size="14" font-weight="500" fill="#111827">评审成本上升</text>
  </g>
  <line x1="310" y1="525" x2="310" y2="555" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 06: AI 提效变成团队负担 (深色反白收口) ============== -->
  <g>
    <rect x="80" y="555" width="460" height="72" rx="10" fill="#1f2937" stroke="#1f2937" stroke-width="2.5"/>
    <g transform="translate(115, 591)">
      <polygon points="0,-13 14,12 -14,12" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="9" r="1.4" fill="#fbbf24"/>
    </g>
    <text x="143" y="588" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.5">06</text>
    <text x="143" y="612" font-size="16" font-weight="600" fill="#ffffff">AI 提效变成团队负担</text>
  </g>

  <!-- ============== 底部强调 ============== -->
  <line x1="120" y1="675" x2="780" y2="675" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="715" text-anchor="middle" font-size="16" fill="#1f2937">
    <tspan>自然语言总结不是输出契约，</tspan>
    <tspan font-weight="700">结构化证据才是工程接口。</tspan>
  </text>
</svg>
