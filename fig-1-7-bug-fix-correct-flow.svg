<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="900" fill="#ffffff"/>

  <!-- ============== 节点 01 ============== -->
  <g>
    <rect x="225" y="40" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="65" r="12" fill="#1f2937"/>
    <text x="252" y="69" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">01</text>
    <text x="278" y="71" font-size="14" font-weight="500" fill="#111827">收集线上投诉与日志</text>
  </g>
  <line x1="450" y1="90" x2="450" y2="120" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 02 ============== -->
  <g>
    <rect x="225" y="120" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="145" r="12" fill="#1f2937"/>
    <text x="252" y="149" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">02</text>
    <text x="278" y="151" font-size="14" font-weight="500" fill="#111827">定位订单、商品、优惠和退款数据</text>
  </g>
  <line x1="450" y1="170" x2="450" y2="200" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 03 ============== -->
  <g>
    <rect x="225" y="200" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="225" r="12" fill="#1f2937"/>
    <text x="252" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">03</text>
    <text x="278" y="231" font-size="14" font-weight="500" fill="#111827">还原下单时的计价快照</text>
  </g>
  <line x1="450" y1="250" x2="450" y2="280" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 重点分组框：失败用例是修复准入条件 ============== -->
  <g>
    <rect x="170" y="280" width="560" height="145" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="200" y="307" font-size="14" font-weight="600" fill="#1f2937">失败用例是修复准入条件</text>
    <text x="200" y="324" font-size="11" fill="#6b7280" font-style="italic">没有可复现的失败用例，禁止进入修复阶段</text>
    <line x1="200" y1="333" x2="700" y2="333" stroke="#d1d5db" stroke-width="1"/>

    <!-- 节点 04 -->
    <g>
      <rect x="225" y="345" width="450" height="36" rx="7" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
      <circle cx="252" cy="363" r="10" fill="#1f2937"/>
      <text x="252" y="367" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">04</text>
      <text x="276" y="369" font-size="14" font-weight="500" fill="#111827">构造部分退款失败用例</text>
    </g>

    <!-- 节点 05 -->
    <g>
      <rect x="225" y="386" width="450" height="36" rx="7" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
      <circle cx="252" cy="404" r="10" fill="#1f2937"/>
      <text x="252" y="408" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">05</text>
      <text x="276" y="410" font-size="14" font-weight="500" fill="#111827">确认失败用例稳定复现</text>
    </g>
  </g>
  <line x1="450" y1="425" x2="450" y2="455" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 06 ============== -->
  <g>
    <rect x="225" y="455" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="480" r="12" fill="#1f2937"/>
    <text x="252" y="484" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">06</text>
    <text x="278" y="486" font-size="14" font-weight="500" fill="#111827">生成多个根因假设</text>
  </g>
  <line x1="450" y1="505" x2="450" y2="535" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 07 (加粗边框突出) ============== -->
  <g>
    <rect x="225" y="535" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2.5"/>
    <circle cx="252" cy="560" r="12" fill="#1f2937"/>
    <text x="252" y="564" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">07</text>
    <text x="278" y="566" font-size="14" font-weight="600" fill="#111827">选择最小修复路径</text>
  </g>
  <!-- 小标签: 最小修复，避免扩大影响 -->
  <g>
    <rect x="690" y="548" width="160" height="30" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="704" cy="563" r="2.8" fill="#4b5563"/>
    <text x="714" y="567" font-size="11" fill="#4b5563">最小修复，避免扩大影响</text>
  </g>
  <line x1="450" y1="585" x2="450" y2="615" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 08 ============== -->
  <g>
    <rect x="225" y="615" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="640" r="12" fill="#1f2937"/>
    <text x="252" y="644" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">08</text>
    <text x="278" y="646" font-size="14" font-weight="500" fill="#111827">修复后让失败用例通过</text>
  </g>
  <line x1="450" y1="665" x2="450" y2="695" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 节点 09 ============== -->
  <g>
    <rect x="225" y="695" width="450" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="252" cy="720" r="12" fill="#1f2937"/>
    <text x="252" y="724" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">09</text>
    <text x="278" y="726" font-size="14" font-weight="500" fill="#111827">补充回归测试</text>
  </g>

  <!-- ============== 底部强调 ============== -->
  <line x1="180" y1="780" x2="720" y2="780" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="820" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">先复现，再修复；先验证，再合并。</text>
</svg>
