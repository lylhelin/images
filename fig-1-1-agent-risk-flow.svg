<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 画布背景 -->
  <rect width="900" height="920" fill="#ffffff"/>

  <!-- ============== 1. 业务需求 ============== -->
  <g>
    <rect x="270" y="70" width="360" height="72" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="450" y="103" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">业务需求：支持优惠券叠加</text>
    <text x="450" y="125" text-anchor="middle" font-size="12" fill="#6b7280">用户 · 支付 · 营销 · 履约 多域联动</text>
  </g>

  <!-- 箭头1 -->
  <line x1="450" y1="142" x2="450" y2="183" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 2. AI Agent 节点（浅灰背景突出） ============== -->
  <g>
    <rect x="270" y="188" width="360" height="78" rx="10" fill="#f3f4f6" stroke="#1f2937" stroke-width="2"/>
    <text x="450" y="222" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">AI Agent 快速生成代码</text>
    <text x="450" y="245" text-anchor="middle" font-size="12" fill="#4b5563">基于局部需求与上下文</text>
  </g>

  <!-- 箭头2 -->
  <line x1="450" y1="266" x2="450" y2="307" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 3. 看起来已经完成（虚线框 · 表面完成） ============== -->
  <g>
    <rect x="110" y="312" width="680" height="125" rx="10" fill="#fafafa" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="138" y="338" font-size="14" font-weight="600" fill="#4b5563">看起来已经完成</text>

    <!-- 三个勾选项 -->
    <g>
      <rect x="140" y="358" width="195" height="60" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="168" cy="388" r="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <path d="M 162 388 L 166 392 L 174 383" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="190" y="392" font-size="14" fill="#374151">代码已生成</text>
    </g>
    <g>
      <rect x="352" y="358" width="195" height="60" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="380" cy="388" r="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <path d="M 374 388 L 378 392 L 386 383" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="402" y="392" font-size="14" fill="#374151">测试已通过</text>
    </g>
    <g>
      <rect x="564" y="358" width="195" height="60" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="592" cy="388" r="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <path d="M 586 388 L 590 392 L 598 383" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="614" y="392" font-size="14" fill="#374151">PR 已提交</text>
    </g>
  </g>

  <!-- 箭头3 -->
  <line x1="450" y1="437" x2="450" y2="477" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 4. 真实研发流程检查（实边框） ============== -->
  <g>
    <rect x="270" y="482" width="360" height="78" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="450" y="515" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">真实研发流程检查</text>
    <text x="450" y="538" text-anchor="middle" font-size="12" fill="#4b5563">测试 · 评审 · 门禁 · 风险 · 成本 · 可回滚性 逐项暴露</text>
  </g>

  <!-- 箭头4 -->
  <line x1="450" y1="560" x2="450" y2="600" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== 5. 暴露出的典型问题（实线分组框 · 两列） ============== -->
  <g>
    <rect x="70" y="605" width="760" height="240" rx="10" fill="#fafafa" stroke="#1f2937" stroke-width="2"/>
    <text x="100" y="631" font-size="15" font-weight="600" fill="#111827">暴露出的典型问题</text>

    <!-- 行1 -->
    <g>
      <rect x="92" y="645" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="118" cy="673" r="12" fill="#1f2937"/>
      <text x="118" y="677" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">01</text>
      <text x="142" y="670" font-size="14" font-weight="500" fill="#111827">需求规则遗漏</text>
      <text x="142" y="688" font-size="11" fill="#6b7280">互斥 / 优先级 / 失效时间未明确</text>
    </g>
    <g>
      <rect x="458" y="645" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="484" cy="673" r="12" fill="#1f2937"/>
      <text x="484" y="677" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">02</text>
      <text x="508" y="670" font-size="14" font-weight="500" fill="#111827">上下文不完整</text>
      <text x="508" y="688" font-size="11" fill="#6b7280">历史逻辑 / 外部依赖未拉齐</text>
    </g>

    <!-- 行2 -->
    <g>
      <rect x="92" y="708" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="118" cy="736" r="12" fill="#1f2937"/>
      <text x="118" y="740" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">03</text>
      <text x="142" y="733" font-size="14" font-weight="500" fill="#111827">测试有效性不足</text>
      <text x="142" y="751" font-size="11" fill="#6b7280">仅 happy path，缺异常 / 边界</text>
    </g>
    <g>
      <rect x="458" y="708" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="484" cy="736" r="12" fill="#1f2937"/>
      <text x="484" y="740" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">04</text>
      <text x="508" y="733" font-size="14" font-weight="500" fill="#111827">退款场景未覆盖</text>
      <text x="508" y="751" font-size="11" fill="#6b7280">金额 / 履约边界缺失</text>
    </g>

    <!-- 行3 -->
    <g>
      <rect x="92" y="771" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="118" cy="799" r="12" fill="#1f2937"/>
      <text x="118" y="803" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">05</text>
      <text x="142" y="796" font-size="14" font-weight="500" fill="#111827">高风险变更未标注</text>
      <text x="142" y="814" font-size="11" fill="#6b7280">财务 / 资损链路无声告警</text>
    </g>
    <g>
      <rect x="458" y="771" width="350" height="56" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="484" cy="799" r="12" fill="#1f2937"/>
      <text x="484" y="803" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">06</text>
      <text x="508" y="796" font-size="14" font-weight="500" fill="#111827">Loop 无停止条件</text>
      <text x="508" y="814" font-size="11" fill="#6b7280">自动修复易陷入死循环</text>
    </g>
  </g>

  <!-- ============== 6. 底部强调结论 ============== -->
  <g>
    <line x1="130" y1="868" x2="770" y2="868" stroke="#991b1b" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="450" y="898" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b" letter-spacing="0.5">最终结果：评审与返工成本上升，AI 的速度优势转化为团队治理压力</text>
  </g>
</svg>
