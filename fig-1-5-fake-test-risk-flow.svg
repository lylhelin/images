<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 760" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="850" height="760" fill="#ffffff"/>

  <!-- ============== 节点 01: AI 生成大量测试 ============== -->
  <g>
    <rect x="175" y="55" width="500" height="72" rx="10" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="215" cy="91" r="17" fill="#10b981"/>
    <path d="M 207 91 L 213 97 L 223 85" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="252" y="88" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">01</text>
    <text x="252" y="110" font-size="16" font-weight="500" fill="#111827">AI 生成大量测试</text>
  </g>
  <line x1="425" y1="127" x2="425" y2="158" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ============== 节点 02: 测试全部通过 ============== -->
  <g>
    <rect x="175" y="160" width="500" height="72" rx="10" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="215" cy="196" r="17" fill="#10b981"/>
    <path d="M 207 196 L 213 202 L 223 190" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="252" y="193" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">02</text>
    <text x="252" y="215" font-size="16" font-weight="500" fill="#111827">测试全部通过</text>
  </g>
  <!-- 小标签: 断言可能过弱 -->
  <g>
    <rect x="555" y="180" width="110" height="30" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="569" cy="195" r="2.8" fill="#4b5563"/>
    <text x="579" y="199" font-size="11" fill="#4b5563">断言可能过弱</text>
  </g>
  <line x1="425" y1="232" x2="425" y2="263" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ============== 节点 03: 覆盖率上升 ============== -->
  <g>
    <rect x="175" y="265" width="500" height="72" rx="10" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="215" cy="301" r="17" fill="#10b981"/>
    <path d="M 207 301 L 213 307 L 223 295" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="252" y="298" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">03</text>
    <text x="252" y="320" font-size="16" font-weight="500" fill="#111827">覆盖率上升</text>
  </g>
  <!-- 小标签: 覆盖率不等于质量 -->
  <g>
    <rect x="535" y="285" width="130" height="30" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="549" cy="300" r="2.8" fill="#4b5563"/>
    <text x="559" y="304" font-size="11" fill="#4b5563">覆盖率不等于质量</text>
  </g>
  <line x1="425" y1="337" x2="425" y2="368" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ============== 节点 04: 团队误以为质量提升 ============== -->
  <g>
    <rect x="175" y="370" width="500" height="72" rx="10" fill="#fafafa" stroke="#1f2937" stroke-width="1.5"/>
    <circle cx="215" cy="406" r="17" fill="#10b981"/>
    <path d="M 207 406 L 213 412 L 223 400" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="252" y="403" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">04</text>
    <text x="252" y="425" font-size="16" font-weight="500" fill="#111827">团队误以为质量提升</text>
  </g>
  <line x1="425" y1="442" x2="425" y2="473" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ============== 节点 05: 真实边界场景上线后出错（深色反白） ============== -->
  <g>
    <rect x="175" y="475" width="500" height="80" rx="10" fill="#1f2937" stroke="#1f2937" stroke-width="2.5"/>
    <g transform="translate(215, 515)">
      <polygon points="0,-14 16,14 -16,14" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
      <line x1="0" y1="-3" x2="0" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="10" r="1.4" fill="#fbbf24"/>
    </g>
    <text x="252" y="510" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="1">05</text>
    <text x="252" y="533" font-size="16" font-weight="600" fill="#ffffff">真实边界场景上线后出错</text>
  </g>

  <!-- ============== 风险说明框（虚线 · 列表式） ============== -->
  <g>
    <rect x="175" y="585" width="500" height="120" rx="10" fill="#fafafa" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="200" y="613" font-size="14" font-weight="600" fill="#1f2937">未覆盖</text>
    <line x1="200" y1="620" x2="655" y2="620" stroke="#e5e7eb" stroke-width="1"/>

    <!-- 列表 2x2 -->
    <g>
      <circle cx="208" cy="650" r="3" fill="#4b5563"/>
      <text x="222" y="654" font-size="13" fill="#374151">互斥规则</text>
      <text x="222" y="672" font-size="11" fill="#9ca3af">例：新人券与满减券</text>
    </g>
    <g>
      <circle cx="358" cy="650" r="3" fill="#4b5563"/>
      <text x="372" y="654" font-size="13" fill="#374151">金额分摊</text>
      <text x="372" y="672" font-size="11" fill="#9ca3af">多券叠加时按比例</text>
    </g>
    <g>
      <circle cx="208" cy="688" r="3" fill="#4b5563"/>
      <text x="222" y="692" font-size="13" fill="#374151">部分退款</text>
      <text x="222" y="690" font-size="11" fill="#9ca3af" visibility="hidden">·</text>
    </g>
    <g>
      <circle cx="358" cy="688" r="3" fill="#4b5563"/>
      <text x="372" y="692" font-size="13" fill="#374151">历史 Bug 回归</text>
    </g>
  </g>

  <!-- ============== 底部强调 ============== -->
  <line x1="200" y1="730" x2="650" y2="730" stroke="#d1d5db" stroke-width="1"/>
  <text x="425" y="755" text-anchor="middle" font-size="17" fill="#1f2937">
    <tspan>通过不等于有效，</tspan>
    <tspan font-weight="700">覆盖率不等于质量。</tspan>
  </text>
</svg>
