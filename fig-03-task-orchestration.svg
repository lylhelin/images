<svg width="920" height="390" viewBox="0 0 920 390" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow-plan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>    </marker>  </defs>  <style>    .svg-title {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 22px;      font-weight: 700;      fill: #111827;    }    .svg-text {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 15px;      font-weight: 600;      fill: #111827;    }    .svg-small {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 13px;      fill: #6b7280;    }    .node-blue {      fill: #eff6ff;      stroke: #2563eb;      stroke-width: 2;    }    .node-green {      fill: #f0fdf4;      stroke: #16a34a;      stroke-width: 2;    }    .node-orange {      fill: #fff7ed;      stroke: #d97706;      stroke-width: 2;    }    .node-purple {      fill: #f5f3ff;      stroke: #7c3aed;      stroke-width: 2;    }    .node-white {      fill: #ffffff;      stroke: #2563eb;      stroke-width: 2;    }    .p-line {      stroke: #2563eb;      stroke-width: 2.4;      fill: none;      marker-end: url(#arrow-plan);    }  </style>  <rect width="920" height="390" rx="16" fill="#f8fafc"/>  <text x="460" y="40" text-anchor="middle" class="svg-title">Harness 工程中的任务编排流程</text>  <rect x="380" y="70" width="160" height="58" rx="10" class="node-white"/>  <text x="460" y="105" text-anchor="middle" class="svg-text">用户需求</text>  <line x1="460" y1="128" x2="460" y2="160" class="p-line"/>  <rect x="380" y="160" width="160" height="58" rx="10" class="node-blue"/>  <text x="460" y="187" text-anchor="middle" class="svg-text">Planner</text>  <text x="460" y="206" text-anchor="middle" class="svg-small">任务拆解与分层</text>  <line x1="460" y1="218" x2="220" y2="250" class="p-line"/>  <line x1="460" y1="218" x2="460" y2="250" class="p-line"/>  <line x1="460" y1="218" x2="700" y2="250" class="p-line"/>  <rect x="140" y="250" width="160" height="58" rx="10" class="node-green"/>  <text x="220" y="277" text-anchor="middle" class="svg-text">Retriever</text>  <text x="220" y="296" text-anchor="middle" class="svg-small">上下文检索</text>  <rect x="380" y="250" width="160" height="58" rx="10" class="node-purple"/>  <text x="460" y="277" text-anchor="middle" class="svg-text">Coder</text>  <text x="460" y="296" text-anchor="middle" class="svg-small">代码生成与修改</text>  <rect x="620" y="250" width="160" height="58" rx="10" class="node-orange"/>  <text x="700" y="277" text-anchor="middle" class="svg-text">Tester</text>  <text x="700" y="296" text-anchor="middle" class="svg-small">测试生成与验证</text>  <line x1="300" y1="279" x2="380" y2="279" class="p-line"/>  <line x1="540" y1="279" x2="620" y2="279" class="p-line"/>  <line x1="700" y1="308" x2="700" y2="335" class="p-line"/>  <rect x="620" y="335" width="160" height="36" rx="10" class="node-green"/>  <text x="700" y="358" text-anchor="middle" class="svg-text">人工 Review</text></svg>