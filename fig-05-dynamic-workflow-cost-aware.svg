<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg">  <defs>    <marker id="arrow-dw" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>    </marker>  </defs>  <style>    .svg-title {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 22px;      font-weight: 700;      fill: #111827;    }    .svg-text {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 15px;      font-weight: 600;      fill: #111827;    }    .svg-small {      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;      font-size: 13px;      fill: #6b7280;    }    .node-blue {      fill: #eff6ff;      stroke: #2563eb;      stroke-width: 2;    }    .node-green {      fill: #f0fdf4;      stroke: #16a34a;      stroke-width: 2;    }    .node-orange {      fill: #fff7ed;      stroke: #d97706;      stroke-width: 2;    }    .node-purple {      fill: #f5f3ff;      stroke: #7c3aed;      stroke-width: 2;    }    .node-white {      fill: #ffffff;      stroke: #2563eb;      stroke-width: 2;    }    .dw-line {      stroke: #2563eb;      stroke-width: 2.3;      fill: none;      marker-end: url(#arrow-dw);    }  </style>  <rect width="960" height="420" rx="16" fill="#f8fafc"/>  <text x="480" y="40" text-anchor="middle" class="svg-title">Dynamic Workflow 成本感知型多 Agent 编排</text>  <rect x="60" y="90" width="140" height="54" rx="10" class="node-blue"/>  <text x="130" y="123" text-anchor="middle" class="svg-text">Budget</text>  <line x1="200" y1="117" x2="250" y2="117" class="dw-line"/>  <rect x="250" y="90" width="140" height="54" rx="10" class="node-green"/>  <text x="320" y="123" text-anchor="middle" class="svg-text">Model</text>  <line x1="390" y1="117" x2="440" y2="117" class="dw-line"/>  <rect x="440" y="90" width="140" height="54" rx="10" class="node-purple"/>  <text x="510" y="123" text-anchor="middle" class="svg-text">Schema</text>  <line x1="580" y1="117" x2="630" y2="117" class="dw-line"/>  <rect x="630" y="90" width="140" height="54" rx="10" class="node-orange"/>  <text x="700" y="123" text-anchor="middle" class="svg-text">Batch</text>  <line x1="770" y1="117" x2="820" y2="117" class="dw-line"/>  <rect x="820" y="90" width="100" height="54" rx="10" class="node-green"/>  <text x="870" y="123" text-anchor="middle" class="svg-text">ROI</text>  <rect x="120" y="215" width="150" height="58" rx="10" class="node-white"/>  <text x="195" y="240" text-anchor="middle" class="svg-text">粗筛</text>  <text x="195" y="259" text-anchor="middle" class="svg-small">Scan</text>  <line x1="270" y1="244" x2="335" y2="244" class="dw-line"/>  <rect x="335" y="215" width="150" height="58" rx="10" class="node-white"/>  <text x="410" y="240" text-anchor="middle" class="svg-text">去重排序</text>  <text x="410" y="259" text-anchor="middle" class="svg-small">Dedupe / Rank</text>  <line x1="485" y1="244" x2="550" y2="244" class="dw-line"/>  <rect x="550" y="215" width="150" height="58" rx="10" class="node-white"/>  <text x="625" y="240" text-anchor="middle" class="svg-text">深挖 Top N</text>  <text x="625" y="259" text-anchor="middle" class="svg-small">DeepDive</text>  <line x1="700" y1="244" x2="765" y2="244" class="dw-line"/>  <rect x="765" y="215" width="150" height="58" rx="10" class="node-white"/>  <text x="840" y="240" text-anchor="middle" class="svg-text">裁剪验证</text>  <text x="840" y="259" text-anchor="middle" class="svg-small">Verify</text>  <path d="M840 273 C840 350 195 350 195 273" class="dw-line"/>  <text x="520" y="366" text-anchor="middle" class="svg-small">通过预算阈值、循环终止和最终预留控制工作流成本</text></svg>