<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'Source Han Sans CN', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="620" fill="#ffffff"/>

  <!-- ============== 左侧：AI 只看到（浅灰底 · 表达局限） ============== -->
  <g>
    <rect x="60" y="70" width="360" height="370" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>

    <!-- 标题区 -->
    <text x="84" y="103" font-size="18" font-weight="600" fill="#111827">AI 只看到</text>
    <text x="84" y="124" font-size="12" fill="#6b7280">局部上下文 · 仅 3 个文件</text>

    <!-- 文件卡片 1: PricingService -->
    <g>
      <rect x="84" y="150" width="312" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <rect x="84" y="150" width="4" height="80" fill="#9ca3af"/>
      <!-- 小文件图标 -->
      <g transform="translate(105, 178)">
        <path d="M0,0 L0,18 L12,18 L12,4 L8,0 z" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M8,0 L8,4 L12,4" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
      </g>
      <text x="130" y="186" font-size="14" font-weight="500" fill="#111827">PricingService</text>
      <text x="130" y="210" font-size="11" fill="#6b7280">计价核心服务 · 1 个文件</text>
    </g>

    <!-- 文件卡片 2: Coupon -->
    <g>
      <rect x="84" y="240" width="312" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <rect x="84" y="240" width="4" height="80" fill="#9ca3af"/>
      <g transform="translate(105, 268)">
        <path d="M0,0 L0,18 L12,18 L12,4 L8,0 z" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M8,0 L8,4 L12,4" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
      </g>
      <text x="130" y="276" font-size="14" font-weight="500" fill="#111827">Coupon</text>
      <text x="130" y="300" font-size="11" fill="#6b7280">优惠券模型 · 1 个文件</text>
    </g>

    <!-- 文件卡片 3: 部分单元测试 -->
    <g>
      <rect x="84" y="330" width="312" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <rect x="84" y="330" width="4" height="80" fill="#9ca3af"/>
      <g transform="translate(105, 358)">
        <path d="M0,0 L0,18 L12,18 L12,4 L8,0 z" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M8,0 L8,4 L12,4" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-linejoin="round"/>
      </g>
      <text x="130" y="366" font-size="14" font-weight="500" fill="#111827">部分单元测试</text>
      <text x="130" y="390" font-size="11" fill="#6b7280">只覆盖自己写的逻辑</text>
    </g>
  </g>

  <!-- ============== 中间：虚线箭头 + 标注 ============== -->
  <g>
    <text x="500" y="225" text-anchor="middle" font-size="12" fill="#4b5563" font-weight="500">局部上下文不足</text>
    <line x1="430" y1="240" x2="565" y2="240" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
    <text x="500" y="270" text-anchor="middle" font-size="12" fill="#4b5563" font-weight="500">无法覆盖真实影响范围</text>
  </g>

  <!-- ============== 右侧：真实影响范围（白底 · 6 个堆叠模块） ============== -->
  <g>
    <rect x="580" y="70" width="360" height="370" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

    <text x="604" y="103" font-size="18" font-weight="600" fill="#111827">真实影响范围</text>
    <text x="604" y="124" font-size="12" fill="#6b7280">下单 · 退款 · 拆单 · 对账 · 复盘</text>

    <!-- 6 个堆叠模块（从下到上绘制，每张向左偏 2px 露出右下厚度） -->
    <g>
      <rect x="605" y="140" width="312" height="42" rx="6" fill="#fafafa" stroke="#9ca3af" stroke-width="1"/>
      <text x="625" y="166" font-size="13" font-weight="500" fill="#111827">PricingService</text>
    </g>
    <g>
      <rect x="603" y="185" width="312" height="42" rx="6" fill="#fafafa" stroke="#9ca3af" stroke-width="1"/>
      <text x="623" y="211" font-size="13" font-weight="500" fill="#111827">RefundCalculator</text>
    </g>
    <g>
      <rect x="601" y="230" width="312" height="42" rx="6" fill="#fafafa" stroke="#9ca3af" stroke-width="1"/>
      <text x="621" y="256" font-size="13" font-weight="500" fill="#111827">OrderSplitService</text>
    </g>
    <g>
      <rect x="599" y="275" width="312" height="42" rx="6" fill="#fafafa" stroke="#9ca3af" stroke-width="1"/>
      <text x="619" y="301" font-size="13" font-weight="500" fill="#111827">PricingSnapshot</text>
    </g>
    <g>
      <rect x="597" y="320" width="312" height="42" rx="6" fill="#fafafa" stroke="#9ca3af" stroke-width="1"/>
      <text x="617" y="346" font-size="13" font-weight="500" fill="#111827">FinanceReconcile</text>
    </g>
    <g>
      <rect x="595" y="365" width="312" height="42" rx="6" fill="#e5e7eb" stroke="#1f2937" stroke-width="1.3"/>
      <text x="615" y="391" font-size="13" font-weight="600" fill="#111827">历史 Bug / 复盘</text>
    </g>
  </g>

  <!-- 左侧对比框 → 左结果框 箭头 -->
  <line x1="240" y1="442" x2="240" y2="473" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 右侧对比框 → 右结果框 箭头 -->
  <line x1="760" y1="442" x2="760" y2="473" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- ============== 底部两个结果框 ============== -->
  <!-- 左结果：看似正确（浅绿底） -->
  <g>
    <rect x="80" y="478" width="320" height="88" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="118" cy="506" r="14" fill="#10b981"/>
    <path d="M 111 506 L 116 511 L 125 500" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="148" y="512" font-size="16" font-weight="600" fill="#065f46">下单计价逻辑看似正确</text>
    <text x="148" y="538" font-size="12" fill="#047857">测试通过 · PR 已合并 · 静默上线</text>
  </g>

  <!-- 右结果：可能出错（深色反白警示） -->
  <g>
    <rect x="600" y="478" width="320" height="88" rx="10" fill="#1f2937" stroke="#1f2937" stroke-width="1.5"/>
    <g transform="translate(640, 506)">
      <polygon points="0,-13 14,12 -14,12" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
      <line x1="0" y1="-3" x2="0" y2="4" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="9" r="1.4" fill="#fbbf24"/>
    </g>
    <text x="668" y="512" font-size="16" font-weight="600" fill="#ffffff">退款 / 拆单 / 对账可能出错</text>
    <text x="668" y="538" font-size="12" fill="#cbd5e1">线上资损 · 对账不平 · 复盘失真</text>
  </g>
</svg>
